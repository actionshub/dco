name: 'dco-check'
description: 'A GitHub Action that verifies commits in pull-request all include Developer Certificate of Origin (DCO) information'
inputs:
  commits:
    description: 'commits in json format'
    required: true
  allow-obvious-fix-label:
    description: 'Label name that, when present on the PR, bypasses DCO requirement'
    required: false
    default: ''
runs:
  using: 'node24'
  main: 'dist/index.js'
