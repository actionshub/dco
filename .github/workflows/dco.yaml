name: DCO Check
on: [pull_request]

permissions:
  contents: read

jobs:
  dco_check_job:
    permissions:
      pull-requests: read  # for get-pr-commits to get list of commits from the PR
    runs-on: ubuntu-latest
    name: DCO Check
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Get PR Commits
      uses: actionshub/get-pr-commits@main # we dont use hashes here, since its ourselves
      id: 'get-pr-commits'
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: DCO Check
      uses: actionshub/dco@main
      with:
        commits: ${{ steps.get-pr-commits.outputs.commits }}
